<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zerufy — Inventario</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--red:#E8432D;--bg:#0A0A0A;--card:#111114;--card2:#18181C;--border:#232329;--text:#F5F0EE;--muted:#7A7A85;--green:#2ECC71;--amber:#f39c12;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;padding-bottom:5.5rem;}

.header{background:#000;border-bottom:1px solid rgba(232,67,45,.25);padding:.9rem 1.1rem;position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;}
.h-logo{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--red);letter-spacing:.14em;line-height:1;}
.h-sub{font-size:.48rem;letter-spacing:.28em;color:var(--muted);text-transform:uppercase;margin-top:.15rem;}
.h-tot{text-align:right;}
.h-tot-n{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;line-height:1;color:var(--text);}
.h-tot-l{font-size:.45rem;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;}

.filters{display:flex;gap:.35rem;padding:.9rem 1.1rem .2rem;overflow-x:auto;scrollbar-width:none;}
.filters::-webkit-scrollbar{display:none;}
.fchip{background:var(--card);border:1px solid var(--border);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.4rem .8rem;border-radius:20px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.fchip.on{background:var(--red);border-color:var(--red);color:#fff;}

.search{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.6rem .85rem;margin:.7rem 1.1rem 0;display:flex;align-items:center;gap:.5rem;}
.search input{background:none;border:none;color:var(--text);font-family:'Barlow',sans-serif;font-size:.82rem;outline:none;flex:1;}
.search input::placeholder{color:#3d3d45;}

.wrap{padding:.9rem 1.1rem;}

/* MATRIX CARD */
.mx{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:.7rem;overflow:hidden;}
.mx-h{padding:.75rem .9rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:.6rem;}
.mx-info{min-width:0;}
.mx-brand{font-size:.44rem;letter-spacing:.24em;color:var(--red);text-transform:uppercase;margin-bottom:.1rem;}
.mx-name{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:800;letter-spacing:.03em;line-height:1.1;}
.mx-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0;}
.mx-tot{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--text);line-height:1;}
.mx-del{background:none;border:none;color:#2e2e35;cursor:pointer;font-size:.72rem;padding:.15rem;}
.mx-del:active{color:var(--red);}

.th-size{display:inline-block;}
.mx-scroll{overflow-x:auto;scrollbar-width:none;}
.mx-scroll::-webkit-scrollbar{display:none;}
.mx-table{border-collapse:collapse;width:100%;min-width:min-content;}
.mx-table th{background:var(--card2);font-family:'Barlow Condensed',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;padding:.45rem .5rem;text-align:center;border-right:1px solid var(--border);white-space:nowrap;}
.mx-table th:first-child{text-align:left;position:sticky;left:0;background:var(--card2);z-index:2;min-width:78px;}
.mx-table td{padding:0;border-top:1px solid var(--border);border-right:1px solid var(--border);text-align:center;}
.mx-table td:first-child{position:sticky;left:0;background:var(--card);z-index:1;padding:.45rem .5rem;text-align:left;}

.cl{display:flex;align-items:center;gap:.35rem;}
.cl-dot{width:8px;height:8px;border-radius:50%;border:1px solid rgba(255,255,255,.18);flex-shrink:0;}
.cl-n{font-size:.62rem;color:var(--text);letter-spacing:.02em;white-space:nowrap;}

.cell{width:100%;min-width:44px;height:38px;background:none;border:none;color:var(--text);font-family:'Bebas Neue',sans-serif;font-size:1.05rem;cursor:pointer;transition:background .15s;}
.cell:active{background:rgba(232,67,45,.15);}
.cell.zero{color:#2e2e35;}
.cell.low{color:var(--amber);}
.cell.ok{color:var(--green);}

.mx-add{padding:.6rem .9rem .75rem;background:var(--card2);border-top:1px solid var(--border);}
.mx-add-row{display:grid;grid-template-columns:1fr 1fr .55fr auto;gap:.35rem;}
.mx-i{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:.45rem .5rem;color:var(--text);font-family:'Barlow',sans-serif;font-size:.7rem;outline:none;min-width:0;}
.mx-i:focus{border-color:var(--red);}
.mx-i::placeholder{color:#3d3d45;}
.mx-btn{background:rgba(232,67,45,.14);border:1px solid rgba(232,67,45,.3);color:var(--red);font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:800;padding:.45rem .6rem;border-radius:5px;cursor:pointer;white-space:nowrap;}
.mx-btn:active{background:var(--red);color:#fff;}

/* EDIT SHEET */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:none;align-items:flex-end;}
.sheet-bg.on{display:flex;}
.sheet{width:100%;max-width:480px;margin:0 auto;background:var(--card);border-top:2px solid var(--red);border-radius:16px 16px 0 0;padding:1.2rem 1.2rem 1.8rem;animation:up .25s ease;}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:38px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 1rem;}
.sheet-t{text-align:center;margin-bottom:1.1rem;}
.sheet-brand{font-size:.46rem;letter-spacing:.24em;color:var(--red);text-transform:uppercase;}
.sheet-name{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:800;letter-spacing:.03em;margin-top:.1rem;}
.sheet-var{font-size:.68rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:.25rem;display:flex;align-items:center;justify-content:center;gap:.4rem;}
.sheet-qty{display:flex;align-items:center;justify-content:center;gap:1.3rem;margin-bottom:1.2rem;}
.sq-btn{width:52px;height:52px;border-radius:50%;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.sq-btn:active{background:var(--red);border-color:var(--red);color:#fff;}
.sq-n{font-family:'Bebas Neue',sans-serif;font-size:3.4rem;line-height:1;min-width:64px;text-align:center;}
.sheet-btns{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;}
.sb{border:none;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:.85rem;font-weight:800;letter-spacing:.08em;padding:.7rem;cursor:pointer;text-transform:uppercase;}
.sb-del{background:var(--card2);border:1px solid var(--border);color:var(--muted);}
.sb-ok{background:var(--red);color:#fff;}

.fab{position:fixed;bottom:1.4rem;right:1.1rem;background:var(--red);border:none;color:#fff;border-radius:50px;padding:.75rem 1.2rem;font-family:'Barlow Condensed',sans-serif;font-size:.85rem;font-weight:800;letter-spacing:.08em;cursor:pointer;text-transform:uppercase;box-shadow:0 4px 18px rgba(232,67,45,.35);z-index:100;}

.new-bg{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:none;align-items:flex-end;}
.new-bg.on{display:flex;}
.new-sheet{width:100%;max-width:480px;margin:0 auto;background:var(--card);border-top:2px solid var(--red);border-radius:16px 16px 0 0;padding:1.2rem 1.2rem 1.8rem;animation:up .25s ease;}
.ns-t{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin-bottom:.9rem;text-align:center;}
.ns-f{margin-bottom:.6rem;}
.ns-l{font-size:.48rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:.3rem;display:block;}
.ns-i{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:.65rem .8rem;color:var(--text);font-family:'Barlow',sans-serif;font-size:.85rem;outline:none;}
.ns-i:focus{border-color:var(--red);}
.ns-i::placeholder{color:#3d3d45;}

.legend{display:flex;gap:.8rem;justify-content:center;padding:.5rem 0 0;}
.lg{display:flex;align-items:center;gap:.25rem;font-size:.5rem;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;}
.lg-d{width:6px;height:6px;border-radius:50%;}

.empty{text-align:center;padding:2.2rem 1rem;color:#2e2e35;}
.empty-i{font-size:2rem;margin-bottom:.5rem;}
.empty-t{font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="h-logo">ZERUFY</div>
    <div class="h-sub">Inventario</div>
  </div>
  <div class="h-tot">
    <div class="h-tot-n" id="hTot">0</div>
    <div class="h-tot-l">Unidades</div>
  </div>
</div>

<div class="filters" id="filters"></div>

<div class="search">
  <span style="color:#3d3d45;font-size:.8rem">🔍</span>
  <input id="iSearch" placeholder="Buscar modelo..." oninput="render()">
</div>

<div class="legend">
  <div class="lg"><div class="lg-d" style="background:#2ECC71"></div>Suficiente</div>
  <div class="lg"><div class="lg-d" style="background:#f39c12"></div>Queda 1</div>
  <div class="lg"><div class="lg-d" style="background:#2e2e35"></div>Agotado</div>
</div>

<div class="wrap"><div id="list"></div></div>

<button class="fab" onclick="openNew()">+ Modelo</button>

<!-- EDIT SHEET -->
<div class="sheet-bg" id="sheetBg" onclick="if(event.target===this)closeSheet()">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-t">
      <div class="sheet-brand" id="shBrand"></div>
      <div class="sheet-name" id="shName"></div>
      <div class="sheet-var" id="shVar"></div>
    </div>
    <div class="sheet-qty">
      <button class="sq-btn" onclick="sheetQty(-1)">−</button>
      <div style="text-align:center"><div class="sq-n" id="shQty">0</div><div style="font-size:.5rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-top:.2rem">En stock</div></div>
      <button class="sq-btn" onclick="sheetQty(1)">+</button>
    </div>
    <div class="sheet-btns">
      <button class="sb sb-del" onclick="sheetDel()">Borrar</button>
      <button class="sb sb-ok" onclick="closeSheet()">Listo</button>
    </div>
  </div>
</div>

<!-- NEW MODEL SHEET -->
<div class="new-bg" id="newBg" onclick="if(event.target===this)closeNew()">
  <div class="new-sheet">
    <div class="sheet-handle"></div>
    <div class="ns-t">Nuevo Modelo</div>
    <div class="ns-f"><label class="ns-l">Modelo</label><input class="ns-i" id="nName" placeholder="Ej: LV Trainer"></div>
    <div class="ns-f"><label class="ns-l">Marca</label><input class="ns-i" id="nBrand" placeholder="Ej: Louis Vuitton"></div>
    <div class="sheet-btns" style="margin-top:.9rem">
      <button class="sb sb-del" onclick="closeNew()">Cancelar</button>
      <button class="sb sb-ok" onclick="createProd()">Crear</button>
    </div>
  </div>
</div>

<script>
var COLORS={'negro':'#111','blanco':'#eee','rojo':'#c0392b','azul':'#2980b9','verde':'#27ae60','amarillo':'#f1c40f','rosado':'#ff69b4','morado':'#8e44ad','gris':'#7f8c8d','marrón':'#6b4423','marron':'#6b4423','beige':'#d4c5a9','naranja':'#e67e22','dorado':'#d4af37','plateado':'#c0c0c0'};
function hexFor(c){return COLORS[c.toLowerCase().trim()]||'#666';}

var STORE_KEY='zerufy_inv_v1';
var products=[];
try{ products=JSON.parse(localStorage.getItem(STORE_KEY)||'[]'); }catch(e){ products=[]; }
function save(){ try{ localStorage.setItem(STORE_KEY,JSON.stringify(products)); }catch(e){ alert('No se pudo guardar'); } }

var filterBrand='all';
var sheetRef=null;

function allBrands(){
  var b=[];
  products.forEach(function(p){ if(p.brand&&!b.includes(p.brand))b.push(p.brand); });
  return b;
}

function renderFilters(){
  var bs=allBrands();
  var h='<button class="fchip'+(filterBrand==='all'?' on':'')+'" onclick="setFilter(\'all\')">Todas</button>';
  bs.forEach(function(b){ h+='<button class="fchip'+(filterBrand===b?' on':'')+'" onclick="setFilter(\''+b+'\')">'+b+'</button>'; });
  document.getElementById('filters').innerHTML=h;
}
function setFilter(b){ filterBrand=b; render(); }

function totalUnits(){
  var t=0;
  products.forEach(function(p){ p.vars.forEach(function(v){t+=v.qty;}); });
  return t;
}

function openNew(){ document.getElementById('newBg').classList.add('on'); setTimeout(function(){document.getElementById('nName').focus();},100); }
function closeNew(){ document.getElementById('newBg').classList.remove('on'); document.getElementById('nName').value=''; document.getElementById('nBrand').value=''; }
function createProd(){
  var n=document.getElementById('nName').value.trim();
  var b=document.getElementById('nBrand').value.trim();
  if(!n){document.getElementById('nName').focus();return;}
  products.unshift({id:Date.now(),name:n,brand:b,vars:[]});
  save(); closeNew(); render();
}

function delProd(id){
  if(!confirm('¿Borrar este modelo?'))return;
  products=products.filter(function(p){return p.id!==id;});
  save(); render();
}

function addVar(pid){
  var c=document.getElementById('ac-'+pid).value.trim();
  var s=document.getElementById('as-'+pid).value.trim();
  var q=parseInt(document.getElementById('aq-'+pid).value)||1;
  if(!c||!s){ if(!c)document.getElementById('ac-'+pid).focus(); else document.getElementById('as-'+pid).focus(); return; }
  var p=products.find(function(x){return x.id===pid;});
  var ex=p.vars.find(function(v){return v.color.toLowerCase()===c.toLowerCase()&&v.size.toLowerCase()===s.toLowerCase();});
  if(ex) ex.qty+=q;
  else p.vars.push({color:c,size:s,qty:q});
  document.getElementById('ac-'+pid).value='';
  document.getElementById('as-'+pid).value='';
  document.getElementById('aq-'+pid).value='1';
  save(); render();
}

function openSheet(pid,color,size){
  var p=products.find(function(x){return x.id===pid;});
  var v=p.vars.find(function(x){return x.color===color&&x.size===size;});
  if(!v){ v={color:color,size:size,qty:0}; p.vars.push(v); save(); }
  sheetRef={pid:pid,color:color,size:size};
  document.getElementById('shBrand').textContent=p.brand||'';
  document.getElementById('shName').textContent=p.name;
  document.getElementById('shVar').innerHTML='<span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:'+hexFor(color)+';border:1px solid rgba(255,255,255,.2)"></span> Color '+color+' &nbsp;·&nbsp; Talla '+size;
  document.getElementById('shQty').textContent=v.qty;
  document.getElementById('sheetBg').classList.add('on');
}
function closeSheet(){ document.getElementById('sheetBg').classList.remove('on'); sheetRef=null; render(); }
function sheetQty(d){
  if(!sheetRef)return;
  var p=products.find(function(x){return x.id===sheetRef.pid;});
  var v=p.vars.find(function(x){return x.color===sheetRef.color&&x.size===sheetRef.size;});
  v.qty=Math.max(0,v.qty+d);
  document.getElementById('shQty').textContent=v.qty;
  save();
}
function sheetDel(){
  if(!sheetRef)return;
  var p=products.find(function(x){return x.id===sheetRef.pid;});
  p.vars=p.vars.filter(function(v){return !(v.color===sheetRef.color&&v.size===sheetRef.size);});
  save(); closeSheet();
}

function render(){
  renderFilters();
  document.getElementById('hTot').textContent=totalUnits();
  var q=document.getElementById('iSearch').value.toLowerCase();
  var filt=products.filter(function(p){
    var okB=filterBrand==='all'||p.brand===filterBrand;
    var okQ=!q||p.name.toLowerCase().includes(q)||(p.brand||'').toLowerCase().includes(q);
    return okB&&okQ;
  });

  if(!filt.length){
    document.getElementById('list').innerHTML='<div class="empty"><div class="empty-i">📦</div><div class="empty-t">'+(products.length?'Sin resultados':'Agrega tu primer modelo')+'</div></div>';
    return;
  }

  var h='';
  filt.forEach(function(p){
    var colors=[],sizes=[];
    p.vars.forEach(function(v){
      if(!colors.includes(v.color))colors.push(v.color);
      if(!sizes.includes(v.size))sizes.push(v.size);
    });
    sizes.sort(function(a,b){
      var na=parseFloat(a.replace(/[^\d.]/g,'')),nb=parseFloat(b.replace(/[^\d.]/g,''));
      if(!isNaN(na)&&!isNaN(nb))return na-nb;
      var order=['XS','S','M','L','XL','XXL'];
      var ia=order.indexOf(a.toUpperCase()),ib=order.indexOf(b.toUpperCase());
      if(ia>-1&&ib>-1)return ia-ib;
      return a.localeCompare(b);
    });
    var tot=p.vars.reduce(function(s,v){return s+v.qty;},0);

    h+='<div class="mx">';
    h+='<div class="mx-h"><div class="mx-info">';
    if(p.brand)h+='<div class="mx-brand">'+p.brand+'</div>';
    h+='<div class="mx-name">'+p.name+'</div></div>';
    h+='<div class="mx-right"><div class="mx-tot">'+tot+'</div>';
    h+='<button class="mx-del" onclick="delProd('+p.id+')">🗑</button></div></div>';

    if(colors.length&&sizes.length){
      h+='<div class="mx-scroll"><table class="mx-table"><thead><tr><th>Color</th>';
      sizes.forEach(function(s){ h+='<th><span class="th-size">'+s+'</span></th>'; });
      h+='</tr></thead><tbody>';
      colors.forEach(function(c){
        h+='<tr><td><div class="cl"><div class="cl-dot" style="background:'+hexFor(c)+'"></div><span class="cl-n">'+c+'</span></div></td>';
        sizes.forEach(function(s){
          var v=p.vars.find(function(x){return x.color===c&&x.size===s;});
          var qty=v?v.qty:0;
          var cls=qty===0?'zero':(qty===1?'low':'ok');
          h+='<td><button class="cell '+cls+'" onclick="openSheet('+p.id+',\''+c+'\',\''+s+'\')">'+qty+'</button></td>';
        });
        h+='</tr>';
      });
      h+='</tbody></table></div>';
    }

    h+='<div class="mx-add"><div class="mx-add-row">';
    h+='<input class="mx-i" id="ac-'+p.id+'" placeholder="Color">';
    h+='<input class="mx-i" id="as-'+p.id+'" placeholder="Ej: US 9">';
    h+='<input class="mx-i" id="aq-'+p.id+'" type="number" value="1" min="1" inputmode="numeric" style="text-align:center">';
    h+='<button class="mx-btn" onclick="addVar('+p.id+')">ADD</button>';
    h+='</div></div>';

    h+='</div>';
  });

  document.getElementById('list').innerHTML=h;
}

render();
</script>
</body>
</html>
