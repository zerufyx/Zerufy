<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zerufy — Catalog</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--red:#e8352a;--gray:#888;--card:#111;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#000;color:#fff;font-family:'Montserrat',sans-serif;font-weight:300;overflow-x:hidden;}

/* HERO */
.hero{position:relative;height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 40%,#1a0400,#000 70%);}
.hero-lines{position:absolute;inset:0;background-image:linear-gradient(rgba(232,53,42,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(232,53,42,.05) 1px,transparent 1px);background-size:60px 60px;}
.hero-content{position:relative;z-index:2;}
.hero-tag{font-size:.65rem;letter-spacing:.5em;color:var(--red);text-transform:uppercase;margin-bottom:2rem;opacity:0;animation:fadeUp 1s .3s forwards;}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(6rem,20vw,14rem);line-height:.9;letter-spacing:.05em;opacity:0;animation:fadeUp 1s .5s forwards;}
.hero-title span{display:block;background:linear-gradient(135deg,#e8352a,#ff5a50,#e8352a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-scroll{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.5rem;opacity:0;animation:fadeUp 1s 1.2s forwards;z-index:3;}
.hero-scroll span{font-size:.6rem;letter-spacing:.4em;color:var(--red);text-transform:uppercase;}
.scroll-line{width:1px;height:50px;background:linear-gradient(to bottom,var(--red),transparent);animation:lineDown 2s 1.5s infinite;}
@keyframes lineDown{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}51%{transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom}}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

/* LANG */
.lang-fixed{position:fixed;top:.7rem;right:.8rem;z-index:999;display:flex;border:1px solid rgba(232,53,42,.5);border-radius:20px;overflow:hidden;background:rgba(0,0,0,.8);}
.lang-btn{background:none;border:none;color:var(--gray);font-family:'Montserrat',sans-serif;font-size:.6rem;font-weight:600;letter-spacing:.1em;padding:.5rem .9rem;cursor:pointer;}
.lang-btn.active{background:var(--red);color:#fff;}

/* PROGRESS */
.progress-bar{position:fixed;top:0;left:0;height:2px;background:linear-gradient(to right,var(--red),#ff5a50);width:0%;z-index:999;}

/* NAV */
.nav-bar{position:sticky;top:0;z-index:100;background:#000;border-bottom:1px solid rgba(232,53,42,.15);padding:0 1.5rem;}
.nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;overflow-x:auto;scrollbar-width:none;}
.nav-inner::-webkit-scrollbar{display:none;}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--red);letter-spacing:.15em;padding:1rem 1.2rem 1rem 0;border-right:1px solid rgba(232,53,42,.2);margin-right:.8rem;white-space:nowrap;flex-shrink:0;}
.nav-btn{background:none;border:none;color:var(--gray);font-family:'Montserrat',sans-serif;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;padding:1.2rem 1rem;cursor:pointer;white-space:nowrap;flex-shrink:0;position:relative;transition:color .3s;}
.nav-btn::after{content:'';position:absolute;bottom:0;left:1rem;right:1rem;height:2px;background:var(--red);transform:scaleX(0);transition:transform .3s;}
.nav-btn:hover,.nav-btn.active{color:var(--red);}
.nav-btn.active::after,.nav-btn:hover::after{transform:scaleX(1);}

/* TICKER */
.ticker{background:#000;border-top:1px solid rgba(232,53,42,.3);border-bottom:1px solid rgba(232,53,42,.3);overflow:hidden;padding:.75rem 0;white-space:nowrap;}
.ticker-inner{display:inline-block;animation:ticker 22s linear infinite;}
.ticker-inner span{font-family:'Bebas Neue',sans-serif;font-size:.8rem;letter-spacing:.35em;color:var(--red);padding:0 1.2rem;}
.ticker-sep{color:rgba(232,53,42,.35)!important;font-size:.5rem!important;letter-spacing:0!important;vertical-align:middle;}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* CATALOG */
.catalog{max-width:1200px;margin:0 auto;padding:3rem 1.5rem;}
.category-section{margin-bottom:5rem;}
.category-section.hidden{display:none;}
.cat-banner{width:100%;height:120px;margin-bottom:2.5rem;position:relative;overflow:hidden;border-radius:2px;}
.cat-banner-bg{position:absolute;inset:0;background:linear-gradient(135deg,#0d0000,#1a0400,#0d0000);display:flex;align-items:center;padding:0 2.5rem;}
.cat-banner-bg::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(45deg,rgba(232,53,42,.03) 0px,rgba(232,53,42,.03) 1px,transparent 1px,transparent 12px);}
.cat-banner-left{position:relative;z-index:1;}
.cat-banner-label{font-size:.6rem;letter-spacing:.4em;color:var(--red);text-transform:uppercase;margin-bottom:.4rem;}
.cat-banner-title{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;letter-spacing:.08em;color:#fff;line-height:1;}
.cat-banner-line{position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(to right,var(--red),transparent);}

/* GRID */
.product-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:#000;}
@media(min-width:600px){.product-grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr));}}

/* CARD */
.product-card{background:#000;border:1px solid rgba(255,255,255,.08);overflow:hidden;cursor:pointer;transition:border-color .3s;}
.product-card:hover{border-color:rgba(232,53,42,.3);}
.product-card:active{opacity:.85;}
.card-img-wrap{position:relative;}
.card-img-wrap img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;}
.card-img-placeholder{width:100%;aspect-ratio:3/4;background:#111;display:flex;align-items:center;justify-content:center;color:#333;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;}
.card-body{padding:.5rem .7rem .7rem;}
.card-cat{font-size:.5rem;letter-spacing:.3em;color:var(--red);text-transform:uppercase;margin-bottom:.1rem;}
.card-name{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:.03em;color:#fff;margin-bottom:.1rem;line-height:1.1;}
.card-brief{font-size:.6rem;color:#777;line-height:1.3;margin-bottom:.2rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-footer{display:flex;align-items:center;justify-content:space-between;gap:.4rem;}
.card-price{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--red);}
.card-cart-btn{background:none;border:1px solid rgba(232,53,42,.5);color:var(--red);font-family:'Montserrat',sans-serif;font-size:.5rem;letter-spacing:.12em;text-transform:uppercase;padding:.4rem .6rem;border-radius:2px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.card-cart-btn:active{background:var(--red);color:#fff;}
.card-price.no-price{font-size:.65rem;font-family:'Montserrat',sans-serif;letter-spacing:.15em;color:var(--gray);font-weight:300;}
.card-price-old{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:#555;text-decoration:line-through;margin-right:.4rem;}

/* BADGES */
.badge-wrap{position:absolute;top:.5rem;left:.5rem;display:flex;flex-direction:column;gap:.3rem;}
.badge{font-family:'Bebas Neue',sans-serif;font-size:.7rem;letter-spacing:.12em;padding:.15rem .5rem;border-radius:2px;display:inline-block;}
.badge-sold{background:var(--red);color:#fff;}
.badge-new{background:#4ade80;color:#000;}
.badge-featured{position:absolute;top:.5rem;right:.5rem;background:#f59e0b;color:#000;font-family:'Bebas Neue',sans-serif;font-size:.7rem;letter-spacing:.1em;padding:.15rem .5rem;border-radius:2px;}

/* MODAL */
#pModal{position:fixed;inset:0;z-index:900;display:none;align-items:flex-end;}
#pModal.open{display:flex;}
#pModalBg{position:absolute;inset:0;background:rgba(0,0,0,.85);}
#pModalBox{position:relative;z-index:1;width:100%;max-width:520px;margin:0 auto;background:#0f0f0f;border-top:1px solid rgba(232,53,42,.3);border-radius:20px 20px 0 0;height:92vh;overflow-y:auto;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
#pModalClose{position:absolute;top:.8rem;right:.8rem;background:rgba(0,0,0,.7);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:1.1rem;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;}

/* MODAL PHOTOS */
.m-photos{position:relative;background:#000;overflow:hidden;}
.m-track{display:flex;}
.m-track img{width:100%;min-width:100%;height:50vh;object-fit:contain;display:block;flex-shrink:0;background:#000;}
.m-dots{position:absolute;bottom:.5rem;left:50%;transform:translateX(-50%);display:flex;gap:.4rem;}
.m-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.35);cursor:pointer;border:none;transition:background .2s;}
.m-dot.active{background:#fff;}

/* MODAL BODY */
.m-body{padding:1.2rem 1.4rem 2.5rem;}
.m-cat{font-size:.55rem;letter-spacing:.35em;color:var(--red);text-transform:uppercase;margin-bottom:.3rem;}
.m-name{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:.04em;line-height:1;margin-bottom:.5rem;}
.m-price{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--red);margin-bottom:.8rem;}
.m-desc{font-size:.75rem;color:#888;line-height:1.7;margin-bottom:.8rem;}
.m-medidas{background:#1a1a1a;border-left:2px solid var(--red);border-radius:2px;padding:.6rem .9rem;margin-bottom:1rem;}
.m-medidas-label{font-size:.52rem;letter-spacing:.25em;color:var(--red);text-transform:uppercase;margin-bottom:.3rem;}
.m-medidas-val{font-size:.75rem;color:#ccc;}
.m-btn{width:100%;padding:.9rem;border-radius:3px;cursor:pointer;font-family:'Montserrat',sans-serif;font-size:.65rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;border:none;text-align:center;display:block;margin-bottom:.6rem;text-decoration:none;}
.m-btn-cart{background:var(--red);color:#fff;}
.m-btn-wa{background:#111;border:1px solid rgba(255,255,255,.15);color:#fff;display:flex;align-items:center;justify-content:center;gap:.5rem;}
.m-btn-off{background:#1a1a1a;color:#444;cursor:not-allowed;}

/* CART */
.wa-float{position:fixed;bottom:2rem;right:1.2rem;z-index:200;background:#111;border:1px solid rgba(255,255,255,.15);color:#fff;padding:1rem;border-radius:50%;text-decoration:none;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.3);}
.wa-float svg{width:22px;height:22px;fill:#fff;}
.cart-fab{position:fixed;bottom:5.5rem;right:1.2rem;z-index:300;background:#000;border:1px solid rgba(232,53,42,.5);border-radius:50px;padding:.65rem 1rem;display:flex;align-items:center;gap:.5rem;cursor:pointer;}
.cart-badge{background:var(--red);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:.9rem;min-width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.cart-fab-label{font-size:.58rem;letter-spacing:.15em;color:var(--red);font-family:'Montserrat',sans-serif;text-transform:uppercase;}
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:600;display:none;align-items:flex-end;}
.cart-overlay.open{display:flex;}
.cart-modal{width:100%;background:#000;border-top:1px solid rgba(232,53,42,.4);border-radius:20px 20px 0 0;padding:1.5rem 1.2rem 2.5rem;max-height:78vh;overflow-y:auto;animation:slideUp .3s ease;}
.cart-handle{width:36px;height:4px;background:rgba(232,53,42,.3);border-radius:2px;margin:0 auto 1.2rem;}
.cart-head{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:#fff;display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
.cart-close-btn{background:none;border:none;color:var(--gray);font-size:1.3rem;cursor:pointer;}
.cart-empty{text-align:center;color:var(--gray);font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;padding:2rem 0;}
.cart-item{display:flex;align-items:center;gap:.8rem;padding:.7rem 0;border-bottom:1px solid rgba(255,255,255,.05);}
.cart-item-info{flex:1;}
.cart-item-cat{font-size:.55rem;letter-spacing:.25em;color:var(--red);text-transform:uppercase;}
.cart-item-name{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:#fff;}
.cart-item-price{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--red);}
.cart-item-del{background:none;border:1px solid rgba(255,255,255,.1);color:var(--gray);width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:.7rem;}
.cart-summary{margin-top:1.2rem;border-top:1px solid rgba(232,53,42,.2);padding-top:1rem;}
.cart-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
.cart-total-label{font-size:.6rem;letter-spacing:.25em;color:var(--gray);text-transform:uppercase;}
.cart-total-val{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--red);}
.cart-action{width:100%;border:none;border-radius:3px;cursor:pointer;font-family:'Montserrat',sans-serif;font-size:.62rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;padding:.85rem;margin-bottom:.5rem;display:flex;align-items:center;justify-content:center;gap:.5rem;}
.cart-action-ask{background:none;border:1px solid rgba(232,53,42,.4);color:var(--red);}
.cart-action-order{background:#25D366;color:#fff;}

footer{border-top:1px solid rgba(255,255,255,.05);padding:3rem 2rem;text-align:center;}
.footer-logo{font-family:'Bebas Neue',sans-serif;font-size:3rem;color:var(--red);letter-spacing:.2em;margin-bottom:.5rem;}
.footer-sub{font-size:.6rem;letter-spacing:.4em;color:var(--gray);text-transform:uppercase;}
</style>
</head>

        <svg width="15" height="15" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>

<!-- PRODUCT MODAL -->
<div id="pModal" onclick="if(event.target===this||event.target.id==='pModalBg')closeModal()">
  <div id="pModalBg"></div>
  <div id="pModalBox">
    <button id="pModalClose" onclick="closeModal()">✕</button>
    <div class="m-photos" id="mPhotos">
      <div class="m-track" id="mTrack"></div>
      <div class="m-dots" id="mDots"></div>
    </div>
    <div class="m-body">
      <div class="m-cat" id="mCat"></div>
      <div class="m-name" id="mName"></div>
      <div id="mPrice"></div>
      <div class="m-desc" id="mDesc"></div>
      <div class="m-medidas" id="mMedidas" style="display:none">
        <div class="m-medidas-label">Medidas / Tallas</div>

<script>
const SB_URL = 'https://drkcstmcdscklcrefxbs.supabase.co';
const SB_KEY = 'sb_publishable_k4jAuf7UCzpT_kp2jSpW-A_1ICXHA2s';

var lang = 'en';
var cart = [];
var allProducts = [];
var mCur = 0, mSrcs = [], mSx = 0, mMoved = false;
var curProduct = null;

const CATS = ['caps','wallets','shoes','belts','bags','watches','sunglasses','jewelry'];
const CAT_EN = {caps:'Caps',wallets:'Wallets',shoes:'Shoes',belts:'Belts',bags:'Bags',watches:'Watches',sunglasses:'Sunglasses',jewelry:'Jewelry'};
const CAT_ES = {caps:'Gorras',wallets:'Billeteras',shoes:'Zapatos',belts:'Cinturones',bags:'Bolsos',watches:'Relojes',sunglasses:'Lentes',jewelry:'Joyería'};

// Load custom categories
var savedCatNames = JSON.parse(localStorage.getItem('zerufyCatNames')||'null');
var savedCats = JSON.parse(localStorage.getItem('zerufyCategories')||'null');
if (savedCats) savedCats.forEach(function(c){ if(!CATS.includes(c)) CATS.push(c); });
if (savedCatNames) Object.keys(savedCatNames).forEach(function(k){ if(!CAT_EN[k]) CAT_EN[k]=savedCatNames[k]; if(!CAT_ES[k]) CAT_ES[k]=savedCatNames[k]; });

// LOAD
async function loadProducts() {
  try {
    const res = await fetch(SB_URL+'/rest/v1/productos?order=sort_order.asc,created_at.asc&hidden=eq.false', {
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
    });
    allProducts = await res.json();
    // Featured first per category
    renderCatalog(allProducts);
  } catch(e) {
    document.getElementById('catalog').innerHTML = '<div style="text-align:center;padding:5rem;color:#555;font-size:.7rem;letter-spacing:.3em;">Error cargando catálogo</div>';
  }
}

function renderCatalog(products) {
  var html = '';
  CATS.forEach(function(cat) {
    var catProds = products.filter(function(p){ return p.categoria===cat; });
    // Featured first
    catProds.sort(function(a,b){ return (b.featured?1:0)-(a.featured?1:0); });
    var nameEn = CAT_EN[cat]||cat;
    var nameEs = CAT_ES[cat]||cat;
    html += '<div class="category-section" data-cat="'+cat+'">';
    html += '<div class="cat-banner"><div class="cat-banner-bg"><div class="cat-banner-left">';
    html += '<div class="cat-banner-label" data-en="New Collection" data-es="Nueva Colección">New Collection</div>';
    html += '<div class="cat-banner-title" data-en="'+nameEn+'" data-es="'+nameEs+'">'+nameEn+'</div>';
    html += '</div><div class="cat-banner-line"></div></div></div>';
    html += '<div class="product-grid">';
    if (!catProds.length) {
      html += '<div style="grid-column:1/-1;text-align:center;padding:3rem;color:#333;font-size:.65rem;letter-spacing:.25em;text-transform:uppercase;" data-en="Coming soon" data-es="Próximamente">Coming soon</div>';
    } else {
      catProds.forEach(function(p, i) {
        var fotos = p.fotos||[];
        var sold = p.sold_out?' style="opacity:.7"':'';
        html += '<div class="product-card" onclick="openModal('+p.id+')"'+sold+'>';
        // Image
        html += '<div class="card-img-wrap">';
        if (fotos.length) {
          html += '<img src="'+fotos[0]+'" loading="lazy" alt="'+p.nombre+'">';
        } else {
          html += '<div class="card-img-placeholder">Sin foto</div>';
        }
        // Badges
        var badgeLeft = '';
        if (p.sold_out) badgeLeft += '<span class="badge badge-sold">SOLD OUT</span>';
        if (p.is_new && !p.sold_out) badgeLeft += '<span class="badge badge-new">NEW</span>';
        if (badgeLeft) html += '<div class="badge-wrap">'+badgeLeft+'</div>';
        if (p.featured) html += '<div class="badge-featured">⭐ TOP</div>';
        html += '</div>';
        // Body
        html += '<div class="card-body">';
        html += '<div class="card-cat" data-en="'+nameEn+'" data-es="'+nameEs+'">'+(lang==='es'?nameEs:nameEn)+'</div>';
        html += '<div class="card-name">'+p.nombre+'</div>';
        if (p.descripcion_breve) html += '<div class="card-brief" id="brief-'+p.id+'">'+p.descripcion_breve+'</div>';
        if (p.discount_price && p.precio) {
          html += '<div><span class="card-price-old">$'+p.precio+'</span><span class="card-price">$'+p.discount_price+'</span></div>';
        } else if (p.precio) {
          html += '<div class="card-price">$'+p.precio+'</div>';
        } else {
          html += '<div class="card-price no-price" data-en="Ask for price" data-es="Consultar precio">'+(lang==='es'?'Consultar precio':'Ask for price')+'</div>';
        }
        html += '</div></div>';
      });
    }
    html += '</div></div>';
  });
  document.getElementById('catalog').innerHTML = html;

  // Intersection observer for animation
  var obs = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){ e.target.style.opacity='1'; e.target.style.transform='translateY(0)'; obs.unobserve(e.target); }
    });
  },{threshold:.1});
  document.querySelectorAll('.product-card').forEach(function(el){
    el.style.opacity='0'; el.style.transform='translateY(20px)'; el.style.transition='opacity .4s,transform .4s';
    obs.observe(el);
  });
}

// MODAL
function openModal(id) {
  var p = allProducts.find(function(x){ return x.id===id; });
  if (!p) return;
  curProduct = p;
  mSrcs = p.fotos||[];
  mCur = 0;

  // Photos
  var track = document.getElementById('mTrack');
  track.style.transition = 'none';
  track.style.transform = 'translateX(0)';
  if (mSrcs.length) {
    track.innerHTML = mSrcs.map(function(s){ return '<img src="'+s+'" alt="'+p.nombre+'">'; }).join('');
    document.getElementById('mPhotos').style.display = 'block';
  } else {
    document.getElementById('mPhotos').style.display = 'none';
  }

  // Dots
  var dots = document.getElementById('mDots');
  if (mSrcs.length > 1) {
    dots.innerHTML = mSrcs.map(function(_,i){ return '<button class="m-dot'+(i===0?' active':'')+'" onclick="mGo('+i+')"></button>'; }).join('');
  } else {
    dots.innerHTML = '';
  }

  // Info
  var catEn = CAT_EN[p.categoria]||p.categoria;
  var catEs = CAT_ES[p.categoria]||p.categoria;
  document.getElementById('mCat').textContent = lang==='es' ? catEs : catEn;
  document.getElementById('mCat').setAttribute('data-en', catEn);
  document.getElementById('mCat').setAttribute('data-es', catEs);
  document.getElementById('mName').textContent = p.nombre;

  // Price
  var priceHtml = '';
  if (p.discount_price && p.precio) {
    priceHtml = '<div style="display:flex;align-items:baseline;gap:.6rem;margin-bottom:.8rem;"><span style="font-family:Bebas Neue,sans-serif;font-size:1.1rem;color:#555;text-decoration:line-through;">$'+p.precio+'</span><span class="m-price">$'+p.discount_price+'</span></div>';
  } else if (p.precio) {
    priceHtml = '<div class="m-price">$'+p.precio+'</div>';
  } else {
    priceHtml = '<div style="font-size:.7rem;color:#888;letter-spacing:.15em;margin-bottom:.8rem;">'+(lang==='es'?'Consultar precio':'Ask for price')+'</div>';
  }
  document.getElementById('mPrice').innerHTML = priceHtml;

  // Desc - use language version
  var descEl = document.getElementById('mDesc');
  var fullDesc = lang==='es' ? (p.descripcion_es||p.descripcion||'') : (p.descripcion||'');
  if (fullDesc) { descEl.textContent = fullDesc; descEl.style.display='block'; }
  else { descEl.style.display='none'; }

  // Medidas
  var medEl = document.getElementById('mMedidas');
  if (p.medidas) { medEl.style.display='block'; document.getElementById('mMedidasVal').textContent=p.medidas; }
  else { medEl.style.display='none'; }

  // Actions
  var msgEn = 'Hi Zerufy! I am interested in '+p.nombre+'. Is it available?';
  var msgEs = 'Hola Zerufy! Me interesa '+p.nombre+'. ¿Está disponible?';
  var msg = lang==='es' ? msgEs : msgEn;
  var actionsHtml = '';
  if (p.sold_out) {
    actionsHtml = '<div class="m-btn m-btn-off">Sold Out — No disponible</div>';
  } else {
    actionsHtml = '<button class="m-btn m-btn-cart" onclick="modalCart()">+ '+(lang==='es'?'Agregar al carrito':'Add to cart')+'</button>';
    actionsHtml += '<a class="m-btn m-btn-wa" href="https://wa.me/14072833785?text='+encodeURIComponent(msg)+'" target="_blank"><svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg> WhatsApp</a>';
  }
  document.getElementById('mActions').innerHTML = actionsHtml;

  document.getElementById('pModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('pModal').classList.remove('open');
  document.body.style.overflow = '';
  curProduct = null;
}

function mGo(n) {
  mCur = (n+mSrcs.length)%mSrcs.length;
  var track = document.getElementById('mTrack');
  track.style.transition = 'transform .3s ease';
  track.style.transform = 'translateX(-'+(mCur*100)+'%)';
  document.querySelectorAll('.m-dot').forEach(function(d,i){ d.classList.toggle('active',i===mCur); });
}

// Touch swipe on modal photos
document.getElementById('mPhotos').addEventListener('touchstart',function(e){ mSx=e.touches[0].clientX; mMoved=false; },{passive:true});
document.getElementById('mPhotos').addEventListener('touchmove',function(e){ if(Math.abs(mSx-e.touches[0].clientX)>10) mMoved=true; },{passive:true});
document.getElementById('mPhotos').addEventListener('touchend',function(e){
  if(mMoved && mSrcs.length>1){ var d=mSx-e.changedTouches[0].clientX; if(Math.abs(d)>40) mGo(mCur+(d>0?1:-1)); }
},{passive:true});

function modalCart() {
  if (!curProduct) return;
  var p = curProduct;
  var price = parseFloat(p.discount_price||p.precio||0);
  cart.push({id:Date.now(),name:p.nombre,cat:CAT_EN[p.categoria]||p.categoria,price:price,pd:price?'$'+price:'Ask'});
  cartRender();
  var btn = document.querySelector('.m-btn-cart');
  if(btn){btn.textContent='✓ '+(lang==='es'?'Agregado!':'Added!');setTimeout(function(){btn.textContent='+ '+(lang==='es'?'Agregar al carrito':'Add to cart');},1200);}
}

// LANG
function setLang(l, btn) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(function(b){ b.classList.toggle('active',b.textContent.toLowerCase()===l); });
  // Re-render catalog with correct language
  if (allProducts.length) renderCatalog(allProducts);
  // Translate static elements
  document.querySelectorAll('[data-en]').forEach(function(el){
    if (!el.children.length) el.textContent = el.getAttribute('data-'+l)||el.textContent;
  });
  // Translate descriptions
  translatePage(l);
  // If modal is open, refresh it
  if (curProduct && document.getElementById('pModal').classList.contains('open')) {
    openModal(curProduct.id);
  }
}

// FILTER
function filterCat(cat, btn) {
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  document.querySelectorAll('.category-section').forEach(function(s){
    s.classList.toggle('hidden', cat!=='all' && s.dataset.cat!==cat);
  });
}

// SCROLL
window.addEventListener('scroll',function(){
  var s=window.scrollY,t=document.body.scrollHeight-window.innerHeight;
  document.getElementById('progressBar').style.width=(s/t*100)+'%';
});

// CART
function cartRender(){
  document.getElementById('cartBadge').textContent=cart.length;
  var list=document.getElementById('cartList'),sum=document.getElementById('cartSummary');
  if(!cart.length){list.innerHTML='<div class="cart-empty">Your cart is empty</div>';sum.style.display='none';}
  else{
    list.innerHTML=cart.map(function(i){return'<div class="cart-item"><div class="cart-item-info"><div class="cart-item-cat">'+i.cat+'</div><div class="cart-item-name">'+i.name+'</div></div><div class="cart-item-price">'+i.pd+'</div><button class="cart-item-del" onclick="cartRemove('+i.id+')">✕</button></div>';}).join('');
    var total=cart.reduce(function(s,i){return s+i.price;},0);
    document.getElementById('cartTotalVal').textContent=total?'$'+total:'TBD';
    sum.style.display='block';
  }
}
function cartRemove(id){cart=cart.filter(function(i){return i.id!==id;});cartRender();}
function cartOpen(){document.getElementById('cartOverlay').classList.add('open');cartRender();}
function cartClose(){document.getElementById('cartOverlay').classList.remove('open');}
function buildMsg(intro,outro){var msg=intro;cart.forEach(function(i){msg+='- '+i.name+' ('+i.cat+') — '+i.pd+'\n';});var t=cart.reduce(function(s,i){return s+i.price;},0);return msg+'\nTotal: '+(t?'$'+t:'TBD')+'\n\n'+outro;}
function cartAsk(){window.open('https://wa.me/14072833785?text='+encodeURIComponent(buildMsg(lang==='es'?'Hola Zerufy! Quiero consultar:\n\n':'Hi Zerufy! Checking availability:\n\n',lang==='es'?'¿Están disponibles?':'Are these available?')),'_blank');}
function cartOrder(){window.open('https://wa.me/14072833785?text='+encodeURIComponent(buildMsg(lang==='es'?'Hola Zerufy! Quiero este pedido:\n\n':'Hi Zerufy! I want to order:\n\n',lang==='es'?'¿Podemos proceder?':'Can we proceed?')),'_blank');}


  function addToCartDirect(id) {
    var p = allProducts.find(function(x){ return x.id===id; });
    if (!p) return;
    var price = parseFloat(p.discount_price||p.precio||0);
    cart.push({id:Date.now(),name:p.nombre,cat:CAT_EN[p.categoria]||p.categoria,price:price,pd:price?'$'+price:'Ask'});
    cartRender();
  }

// INIT
loadProducts();
</script>
