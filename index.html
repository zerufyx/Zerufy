<!DOCTYPE html>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root { --black:#000000; --red:#e8352a; --white:#ffffff; --gray:#888; --card-bg:#111111; }
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { background:#000; color:#fff; font-family:'Montserrat',sans-serif; font-weight:300; min-height:100vh; overflow-x:hidden; }

    .hero { position:relative; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; overflow:hidden; }
    .hero::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse 80% 60% at 50% 40%,#1a0400 0%,#000 70%); }
    .hero-lines { position:absolute; inset:0; background-image:linear-gradient(rgba(232,53,42,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(232,53,42,.05) 1px,transparent 1px); background-size:60px 60px; }
    .hero-content { position:relative; z-index:2; }
    .hero-tag { font-size:.65rem; letter-spacing:.5em; color:var(--red); text-transform:uppercase; margin-bottom:2rem; opacity:0; animation:fadeUp 1s .3s forwards; }
    .hero-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(6rem,20vw,14rem); line-height:.9; letter-spacing:.05em; opacity:0; animation:fadeUp 1s .5s forwards; }
    .hero-title span { display:block; background:linear-gradient(135deg,#e8352a,#ff5a50,#e8352a); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; animation:glitch 4s infinite; }
    @keyframes glitch { 0%,90%,100%{transform:none} 92%{transform:skewX(-2deg)} 94%{transform:skewX(2deg)} }
    .hero-scroll { position:absolute; bottom:2rem; left:50%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; gap:.5rem; opacity:0; animation:fadeUp 1s 1.2s forwards; z-index:3; }
    .hero-scroll span { font-size:.6rem; letter-spacing:.4em; color:var(--red); text-transform:uppercase; }
    .scroll-line { width:1px; height:50px; background:linear-gradient(to bottom,var(--red),transparent); animation:lineDown 2s 1.5s infinite; }
    @keyframes lineDown { 0%{transform:scaleY(0);transform-origin:top} 50%{transform:scaleY(1);transform-origin:top} 51%{transform-origin:bottom} 100%{transform:scaleY(0);transform-origin:bottom} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

    .lang-fixed { position:fixed; top:.7rem; right:.8rem; z-index:999; display:flex; border:1px solid rgba(232,53,42,.5); border-radius:20px; overflow:hidden; background:rgba(0,0,0,.8); }
    .lang-btn { background:none; border:none; color:var(--gray); font-family:'Montserrat',sans-serif; font-size:.6rem; font-weight:600; letter-spacing:.1em; padding:.5rem .9rem; cursor:pointer; }
    .lang-btn.active { background:var(--red); color:#fff; }

    .progress-bar { position:fixed; top:0; left:0; height:2px; background:linear-gradient(to right,var(--red),#ff5a50); width:0%; z-index:999; transition:width .1s; }

    .nav-bar { position:sticky; top:0; z-index:100; background:#000; border-bottom:1px solid rgba(232,53,42,.15); padding:0 1.5rem; }
    .nav-inner { max-width:1200px; margin:0 auto; display:flex; align-items:center; overflow-x:auto; scrollbar-width:none; }
    .nav-inner::-webkit-scrollbar { display:none; }
    .nav-logo { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; color:var(--red); letter-spacing:.15em; padding:1rem 1.2rem 1rem 0; border-right:1px solid rgba(232,53,42,.2); margin-right:.8rem; white-space:nowrap; flex-shrink:0; }
    .nav-btn { background:none; border:none; color:var(--gray); font-family:'Montserrat',sans-serif; font-size:.6rem; letter-spacing:.2em; text-transform:uppercase; padding:1.2rem 1rem; cursor:pointer; white-space:nowrap; flex-shrink:0; position:relative; transition:color .3s; }
    .nav-btn::after { content:''; position:absolute; bottom:0; left:1rem; right:1rem; height:2px; background:var(--red); transform:scaleX(0); transition:transform .3s; }
    .nav-btn:hover,.nav-btn.active { color:var(--red); }
    .nav-btn.active::after,.nav-btn:hover::after { transform:scaleX(1); }

    .ticker { background:#000; border-top:1px solid rgba(232,53,42,.3); border-bottom:1px solid rgba(232,53,42,.3); overflow:hidden; padding:.75rem 0; white-space:nowrap; }
    .ticker-inner { display:inline-block; animation:ticker 22s linear infinite; }
    .ticker-inner span { font-family:'Bebas Neue',sans-serif; font-size:.8rem; letter-spacing:.35em; color:var(--red); padding:0 1.2rem; }
    .ticker-sep { color:rgba(232,53,42,.35)!important; font-size:.5rem!important; letter-spacing:0!important; vertical-align:middle; }
    @keyframes ticker { from{transform:translateX(0)} to{transform:translateX(-50%)} }

    .catalog { max-width:1200px; margin:0 auto; padding:3rem 1.5rem; }
    .category-section { margin-bottom:5rem; }
    .category-section.hidden { display:none; }

    .cat-banner { width:100%; height:120px; margin-bottom:2.5rem; position:relative; overflow:hidden; border-radius:2px; }
    .cat-banner-bg { position:absolute; inset:0; background:linear-gradient(135deg,#0d0000,#1a0400,#0d0000); display:flex; align-items:center; padding:0 2.5rem; }
    .cat-banner-bg::before { content:''; position:absolute; inset:0; background-image:repeating-linear-gradient(45deg,rgba(232,53,42,.03) 0px,rgba(232,53,42,.03) 1px,transparent 1px,transparent 12px); }
    .cat-banner-left { position:relative; z-index:1; }
    .cat-banner-label { font-size:.6rem; letter-spacing:.4em; color:var(--red); text-transform:uppercase; margin-bottom:.4rem; }
    .cat-banner-title { font-family:'Bebas Neue',sans-serif; font-size:3.5rem; letter-spacing:.08em; color:#fff; line-height:1; }
    .cat-banner-line { position:absolute; bottom:0; left:0; right:0; height:1px; background:linear-gradient(to right,var(--red),transparent); }

    .product-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:1px; background:#000; }
    @media(min-width:600px){ .product-grid { grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); } }

    .product-card { background:#000; border:1px solid rgba(255,255,255,.08); overflow:hidden; transition:transform .4s,border-color .4s; opacity:0; transform:translateY(20px); }
    .product-card.visible { opacity:1; transform:translateY(0); transition:opacity .4s,transform .4s,border-color .3s; }
    .product-card:hover { border-color:rgba(232,53,42,.3); }

    /* SLIDER */
    .card-slider { position:relative; overflow:hidden; cursor:pointer; background:#111; }
    .card-slider-track { display:flex; transition:transform .3s ease; }
    .card-slider-track img { min-width:100%; width:100%; aspect-ratio:3/4; object-fit:cover; display:block; flex-shrink:0; }
    .card-slider-dots { position:absolute; bottom:.5rem; left:50%; transform:translateX(-50%); display:flex; gap:.4rem; pointer-events:none; }
    .card-slider-dot { width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,.35); }
    .card-slider-dot.active { background:#fff; }
    .card-img-single { width:100%; aspect-ratio:3/4; object-fit:cover; display:block; cursor:pointer; }
    .card-img-placeholder { width:100%; aspect-ratio:3/4; background:#111; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.5rem; }
    .card-img-placeholder span { font-size:.6rem; letter-spacing:.2em; color:#333; text-transform:uppercase; }

    .card-body { padding:1rem 1.2rem 1.2rem; }
    .card-category { font-size:.55rem; letter-spacing:.35em; color:var(--red); text-transform:uppercase; margin-bottom:.3rem; }
    .card-name { font-family:'Bebas Neue',sans-serif; font-size:1.3rem; letter-spacing:.05em; color:#fff; margin-bottom:.3rem; line-height:1.2; }
    .card-desc { font-size:.68rem; color:var(--gray); line-height:1.6; margin-bottom:.8rem; }
    .card-footer { display:flex; flex-direction:column; gap:.5rem; }
    .card-price { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; color:var(--red); }
    .card-price.no-price { font-size:.65rem; font-family:'Montserrat',sans-serif; letter-spacing:.15em; color:var(--gray); font-weight:300; }
    .card-add-btn { font-size:.58rem; letter-spacing:.15em; text-transform:uppercase; border:1px solid rgba(232,53,42,.5); padding:.5rem; background:none; color:var(--red); cursor:pointer; font-family:'Montserrat',sans-serif; border-radius:2px; width:100%; text-align:center; transition:background .2s,color .2s; }
    .card-add-btn:active { background:var(--red); color:#fff; }
    .card-ask { font-size:.6rem; letter-spacing:.2em; color:var(--red); text-transform:uppercase; border:1px solid rgba(232,53,42,.3); padding:.5rem; text-decoration:none; text-align:center; display:block; transition:background .2s; }
    .card-ask:active { background:var(--red); color:#fff; }

    #lbOverlay.open { display:flex; }
    #lbTrack { display:flex; transition:transform .3s ease; }
    #lbTrack img { width:100vw; min-width:100vw; max-height:90vh; object-fit:contain; flex-shrink:0; }
    #lbClose { position:absolute; top:1rem; right:1.2rem; background:none; border:none; color:#fff; font-size:2.2rem; cursor:pointer; z-index:10; }
    #lbCount { position:absolute; bottom:1.5rem; font-size:.65rem; letter-spacing:.2em; color:rgba(255,255,255,.5); text-transform:uppercase; }

    /* CART */
    .wa-float { position:fixed; bottom:2rem; right:1.2rem; z-index:200; background:#25D366; color:#fff; padding:1rem; border-radius:50%; text-decoration:none; box-shadow:0 8px 30px rgba(37,211,102,.25); display:flex; align-items:center; justify-content:center; }
    .wa-float svg { width:22px; height:22px; fill:#fff; }
    .cart-fab { position:fixed; bottom:5.5rem; right:1.2rem; z-index:300; background:#000; border:1px solid rgba(232,53,42,.5); border-radius:50px; padding:.65rem 1rem; display:flex; align-items:center; gap:.5rem; cursor:pointer; }
    .cart-fab-badge { background:var(--red); color:#fff; font-family:'Bebas Neue',sans-serif; font-size:.9rem; min-width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
    .cart-fab-label { font-size:.58rem; letter-spacing:.15em; color:var(--red); font-family:'Montserrat',sans-serif; text-transform:uppercase; }
    .cart-overlay { position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:600; display:none; align-items:flex-end; }

    .cart-modal { width:100%; background:#000; border-top:1px solid rgba(232,53,42,.4); border-radius:20px 20px 0 0; padding:1.5rem 1.2rem 2.5rem; max-height:78vh; overflow-y:auto; animation:slideUp .3s ease; }

    .cart-close-btn { background:none; border:none; color:var(--gray); font-size:1.3rem; cursor:pointer; }
    .cart-empty { text-align:center; color:var(--gray); font-size:.7rem; letter-spacing:.2em; text-transform:uppercase; padding:2rem 0; }
    .cart-item { display:flex; align-items:center; gap:.8rem; padding:.7rem 0; border-bottom:1px solid rgba(255,255,255,.05); }
    .cart-item-info { flex:1; }
    .cart-item-cat { font-size:.55rem; letter-spacing:.25em; color:var(--red); text-transform:uppercase; }
    .cart-item-name { font-family:'Bebas Neue',sans-serif; font-size:1rem; color:#fff; }
    .cart-item-price { font-family:'Bebas Neue',sans-serif; font-size:1.1rem; color:var(--red); }
    .cart-item-del { background:none; border:1px solid rgba(255,255,255,.1); color:var(--gray); width:24px; height:24px; border-radius:50%; cursor:pointer; font-size:.7rem; }
    .cart-summary { margin-top:1.2rem; border-top:1px solid rgba(232,53,42,.2); padding-top:1rem; }
    .cart-total-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
    .cart-total-label { font-size:.6rem; letter-spacing:.25em; color:var(--gray); text-transform:uppercase; }
    .cart-total-val { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; color:var(--red); }
    .cart-btn { width:100%; border:none; border-radius:3px; cursor:pointer; font-family:'Montserrat',sans-serif; font-size:.62rem; font-weight:600; letter-spacing:.18em; text-transform:uppercase; padding:.85rem; margin-bottom:.5rem; display:flex; align-items:center; justify-content:center; gap:.5rem; }
    .cart-btn-ask { background:none; border:1px solid rgba(232,53,42,.4); color:var(--red); }

  </style>
</head>

  shoes:{en:'Shoes',es:'Zapatos'},
  belts:{en:'Belts',es:'Cinturones'},
  bags:{en:'Bags',es:'Bolsos'},
  watches:{en:'Watches',es:'Relojes'},
  sunglasses:{en:'Sunglasses',es:'Lentes'},
  bracelets:{en:'Bracelets',es:'Brazaletes'}
};

// LOAD PRODUCTS FROM SUPABASE
async function loadProducts() {
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/productos?order=created_at.asc', {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    const products = await res.json();
    renderCatalog(products);
  } catch(e) {
    document.getElementById('catalog').innerHTML = '<div style="text-align:center;padding:5rem;color:#555;font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;">Error cargando catálogo</div>';
  }
}

function renderCatalog(products) {
  const catalog = document.getElementById('catalog');
  if (!products.length) {
    catalog.innerHTML = '<div style="text-align:center;padding:5rem;color:#333;font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;">Catálogo en construcción — vuelve pronto</div>';
    return;
  }

  let html = '';
  CATS.forEach(function(cat) {
    const catProducts = products.filter(function(p){ return p.categoria === cat; });
    const catName = CAT_NAMES[cat];
    html += '<div class="category-section" data-cat="' + cat + '">';
    html += '<div class="cat-banner"><div class="cat-banner-bg"><div class="cat-banner-left">';
    html += '<div class="cat-banner-label" data-en="New Collection" data-es="Nueva Colección">New Collection</div>';
    html += '<div class="cat-banner-title" data-en="' + catName.en + '" data-es="' + catName.es + '">' + catName.en + '</div>';
    html += '</div><div class="cat-banner-line"></div></div></div>';
    html += '<div class="product-grid">';

    if (!catProducts.length) {
      html += '<div class="empty-cat" data-en="Coming soon" data-es="Próximamente">Coming soon</div>';
    } else {
      catProducts.forEach(function(p, idx) {
        const fotos = p.fotos || [];
        const price = p.precio ? '$' + p.precio : null;
        const sliderKey = 'sl-' + p.id;
        html += '<div class="product-card" data-product-index="' + (idx+1) + '" data-product-cat="' + cat + '">';

        if (fotos.length > 1) {
          // Slider
          const slides = fotos.map(function(f){ return '<img src="' + f + '" loading="lazy">'; }).join('');
          const dots = fotos.map(function(_,i){ return '<div class="card-slider-dot' + (i===0?' active':'') + '"></div>'; }).join('');
          html += '<div class="card-slider" id="' + sliderKey + '" onclick="slOpen(\'' + sliderKey + '\')">';
          html += '<div class="card-slider-track">' + slides + '</div>';
          if (fotos.length > 1) html += '<div class="card-slider-dots">' + dots + '</div>';
          html += '</div>';
        } else if (fotos.length === 1) {
          html += '<img class="card-img-single" src="' + fotos[0] + '" loading="lazy" onclick="lbOpen([\'' + fotos[0] + '\'],0)">';
        } else {
          html += '<div class="card-img-placeholder"><span>📷</span><span>Sin foto</span></div>';
        }

        html += '<div class="card-body">';
        html += '<p class="card-category" data-en="' + catName.en + '" data-es="' + catName.es + '">' + catName.en + '</p>';
        html += '<h3 class="card-name">' + p.nombre + '</h3>';
        if (p.descripcion) html += '<p class="card-desc">' + p.descripcion + '</p>';
        html += '<div class="card-footer">';
        if (price) {
          html += '<span class="card-price">' + price + '</span>';
        } else {
          html += '<span class="card-price no-price" data-en="Ask for price" data-es="Consultar precio">Ask for price</span>';
        }
        const msgEn = 'Hi Zerufy! I\'m interested in ' + p.nombre + ' #' + (idx+1) + '. Is it available?';
        const msgEs = 'Hola Zerufy! Me interesa ' + p.nombre + ' #' + (idx+1) + '. ¿Está disponible?';
        html += '<button class="card-add-btn" onclick="cartAdd(this)">+ Cart</button>';
        html += '<a class="card-ask" data-en="Inquire" data-es="Consultar" data-msg-en="' + msgEn + '" data-msg-es="' + msgEs + '" href="https://wa.me/14072833785?text=' + encodeURIComponent(msgEn) + '" target="_blank">Inquire</a>';
        html += '</div></div></div>';
      });
    }

    html += '</div></div>';
  });

  catalog.innerHTML = html;

  // Init sliders
  document.querySelectorAll('.card-slider').forEach(function(sl) {
    var id = sl.id;
    sliders[id] = { cur: 0, srcs: Array.from(sl.querySelectorAll('img')).map(function(i){ return i.src; }) };
    var sx = 0, moved = false;
    sl.addEventListener('touchstart', function(e){ sx = e.touches[0].clientX; moved = false; }, {passive:true});
    sl.addEventListener('touchmove', function(e){ if(Math.abs(sx-e.touches[0].clientX)>10) moved=true; }, {passive:true});
    sl.addEventListener('touchend', function(e){
      var diff = sx - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 35) { slGo(id, sliders[id].cur + (diff>0?1:-1)); moved=true; }
      if (!moved) slOpen(id);
    }, {passive:true});
  });

  // Animate cards
  var obs = new IntersectionObserver(function(entries){
    entries.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('visible'); obs.unobserve(e.target); } });
  }, {threshold:.1});
  document.querySelectorAll('.product-card').forEach(function(el){ obs.observe(el); });

  // Fix inquire links
  document.querySelectorAll('.card-ask').forEach(function(a){
    a.href = 'https://wa.me/14072833785?text=' + encodeURIComponent(a.getAttribute('data-msg-en')||'');
  });
}

// SLIDER
function slGo(id, n) {
  var sl = document.getElementById(id);
  if (!sl || !sliders[id]) return;
  var imgs = sl.querySelectorAll('.card-slider-track img');
  var dots = sl.querySelectorAll('.card-slider-dot');
  sliders[id].cur = (n + imgs.length) % imgs.length;
  sl.querySelector('.card-slider-track').style.transform = 'translateX(-' + (sliders[id].cur * 100) + '%)';
  dots.forEach(function(d,i){ d.classList.toggle('active', i===sliders[id].cur); });
}

function slOpen(id) {
  if (!sliders[id]) return;
  lbOpen(sliders[id].srcs, sliders[id].cur);
}

// LIGHTBOX
function lbOpen(srcs, idx) {
  lbSrcs = srcs; lbCur = idx;
  var track = document.getElementById('lbTrack');
  track.innerHTML = srcs.map(function(s){ return '<img src="'+s+'" alt="">'; }).join('');
  track.style.transform = 'translateX(-' + (lbCur * 100) + 'vw)';
  document.getElementById('lbCount').textContent = (lbCur+1) + ' / ' + srcs.length;
  document.getElementById('lbOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function lbClose() { document.getElementById('lbOverlay').classList.remove('open'); document.body.style.overflow = ''; }

document.getElementById('lbOverlay').addEventListener('touchstart', function(e){ lbSx=e.touches[0].clientX; }, {passive:true});
document.getElementById('lbOverlay').addEventListener('touchend', function(e){
  var diff = lbSx - e.changedTouches[0].clientX;
  if (Math.abs(diff)>40) {
    lbCur = (lbCur+(diff>0?1:-1)+lbSrcs.length)%lbSrcs.length;
    document.getElementById('lbTrack').style.transform = 'translateX(-'+(lbCur*100)+'vw)';
    document.getElementById('lbCount').textContent = (lbCur+1)+' / '+lbSrcs.length;
  }
}, {passive:true});

// LANG
function setLang(l, btn) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(function(b){ b.classList.toggle('active', b.textContent.toLowerCase()===l); });
  document.querySelectorAll('[data-en]').forEach(function(el){ el.innerHTML = el.getAttribute('data-'+l)||el.innerHTML; });
  document.querySelectorAll('.card-ask').forEach(function(a){
    var m = a.getAttribute('data-msg-'+l)||'';
    a.href = 'https://wa.me/14072833785?text='+encodeURIComponent(m);
  });
}

// FILTER
function filterCat(cat, btn) {
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  document.querySelectorAll('.category-section').forEach(function(s){
    s.classList.toggle('hidden', cat!=='all' && s.dataset.cat!==cat);
  });
}

// SCROLL
window.addEventListener('scroll', function(){
  var s=window.scrollY, t=document.body.scrollHeight-window.innerHeight;
  document.getElementById('progressBar').style.width=(s/t*100)+'%';
});

// CART
function cartAdd(btn) {
  try {
    var card = btn.closest('.product-card');
    var name = card.querySelector('.card-name').innerText.trim();
    var idx = card.getAttribute('data-product-index');
    if (idx) name = name + ' #' + idx;
    var cat = card.querySelector('.card-category').getAttribute('data-en') || '';
    var priceEl = card.querySelector('.card-price');
    var pt = priceEl ? priceEl.innerText.trim() : '';
    var price = 0, pd = 'Ask for price';
    if (pt && !pt.match(/ask|consult/i)) { var n=parseInt(pt.replace(/[^0-9]/g,'')); if(n){price=n;pd='$'+n;} }
    cart.push({id:Date.now(),name,cat,price,pd});
    cartRender();
    btn.innerText='✓ Added!'; btn.style.background='var(--red)'; btn.style.color='#fff';
    setTimeout(function(){btn.innerText='+ Cart';btn.style.background='';btn.style.color='';},1200);
  } catch(e){}
}

function cartRemove(id){ cart=cart.filter(function(i){return i.id!==id;}); cartRender(); }

function cartRender(){
  document.getElementById('cartBadge').innerText=cart.length;
  var list=document.getElementById('cartList'), summary=document.getElementById('cartSummary');
  if(!cart.length){list.innerHTML='<div class="cart-empty">Your cart is empty</div>';summary.style.display='none';}
  else{
    list.innerHTML=cart.map(function(i){return '<div class="cart-item"><div class="cart-item-info"><div class="cart-item-cat">'+i.cat+'</div><div class="cart-item-name">'+i.name+'</div></div><div class="cart-item-price">'+i.pd+'</div><button class="cart-item-del" onclick="cartRemove('+i.id+')">✕</button></div>';}).join('');
    var total=cart.reduce(function(s,i){return s+i.price;},0);
    document.getElementById('cartTotalVal').innerText=total?'$'+total:'TBD';
    summary.style.display='block';
  }
}

function cartOpen(){ document.getElementById('cartOverlay').classList.add('open'); cartRender(); }
function cartClose(){ document.getElementById('cartOverlay').classList.remove('open'); }

function buildMsg(intro,outro){
  var msg=intro;
  cart.forEach(function(i){msg+='- '+i.name+' ('+i.cat+') — '+i.pd+'\n';});
  var total=cart.reduce(function(s,i){return s+i.price;},0);
  return msg+'\nTotal: '+(total?'$'+total:'TBD')+'\n\n'+outro;
}

function cartAsk(){ var es=lang==='es'; window.open('https://wa.me/14072833785?text='+encodeURIComponent(buildMsg(es?'Hola Zerufy! Quiero consultar disponibilidad:\n\n':'Hi Zerufy! Checking availability for:\n\n',es?'¿Están disponibles?':'Are these available?')),'_blank'); }
function cartOrder(){ var es=lang==='es'; window.open('https://wa.me/14072833785?text='+encodeURIComponent(buildMsg(es?'Hola Zerufy! Quiero hacer este pedido:\n\n':'Hi Zerufy! I want to place this order:\n\n',es?'¿Podemos proceder?':'Can we proceed?')),'_blank'); }

// INIT
loadProducts();
</script>
