<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zerufy — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root { --red:#e8352a; --black:#000; --card:#0f0f0f; --border:rgba(232,53,42,.2); --gray:#888; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; color:#fff; font-family:'Montserrat',sans-serif; min-height:100vh; }

/* LOGIN */
.login-screen { position:fixed; inset:0; background:#000; display:flex; align-items:center; justify-content:center; z-index:999; }
.login-box { background:#0f0f0f; border:1px solid var(--border); border-radius:4px; padding:2.5rem; width:90%; max-width:360px; text-align:center; }
.login-logo { font-family:'Bebas Neue',sans-serif; font-size:2.5rem; color:var(--red); letter-spacing:.2em; margin-bottom:.3rem; }
.login-sub { font-size:.6rem; letter-spacing:.3em; color:var(--gray); text-transform:uppercase; margin-bottom:2rem; }
.login-input { width:100%; background:#1a1a1a; border:1px solid rgba(255,255,255,.1); color:#fff; font-family:'Montserrat',sans-serif; font-size:1rem; padding:.9rem 1rem; border-radius:2px; outline:none; margin-bottom:1rem; text-align:center; letter-spacing:.2em; }
.login-input:focus { border-color:var(--red); }
.login-btn { width:100%; background:var(--red); border:none; color:#fff; font-family:'Bebas Neue',sans-serif; font-size:1.2rem; letter-spacing:.2em; padding:1rem; border-radius:2px; cursor:pointer; }
.login-error { color:var(--red); font-size:.7rem; letter-spacing:.1em; margin-top:.8rem; display:none; }

/* HEADER */
.header { background:#000; border-bottom:1px solid var(--border); padding:1rem 1.5rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.logo { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; color:var(--red); letter-spacing:.15em; }
.logo-sub { font-size:.5rem; letter-spacing:.3em; color:var(--gray); text-transform:uppercase; }
.btn { background:none; border:1px solid var(--border); color:var(--red); font-family:'Montserrat',sans-serif; font-size:.6rem; letter-spacing:.2em; text-transform:uppercase; padding:.5rem 1rem; cursor:pointer; transition:all .2s; border-radius:2px; }
.btn:hover, .btn-primary { background:var(--red); color:#fff; border-color:var(--red); }
.btn-danger { border-color:rgba(232,53,42,.3); color:#666; }
.btn-danger:hover { background:#333; color:#fff; border-color:#333; }

/* MAIN */
.main { padding:1.5rem; max-width:900px; margin:0 auto; }

/* FORM */
.form-card { background:var(--card); border:1px solid var(--border); border-radius:4px; padding:1.5rem; margin-bottom:2rem; }
.form-title { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; letter-spacing:.05em; margin-bottom:1.2rem; color:#fff; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
.form-group { display:flex; flex-direction:column; gap:.4rem; }
.form-group.full { grid-column:1/-1; }
label { font-size:.55rem; letter-spacing:.25em; color:var(--gray); text-transform:uppercase; }
input, select, textarea { background:#1a1a1a; border:1px solid rgba(255,255,255,.1); color:#fff; font-family:'Montserrat',sans-serif; font-size:.85rem; padding:.7rem .9rem; border-radius:2px; outline:none; width:100%; }
input:focus, select:focus, textarea:focus { border-color:var(--red); }
select option { background:#1a1a1a; }

/* PHOTO UPLOAD */
.photo-area { border:2px dashed rgba(232,53,42,.3); border-radius:4px; padding:2rem; text-align:center; cursor:pointer; transition:border-color .2s; position:relative; }
.photo-area:hover { border-color:var(--red); }
.photo-area input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.photo-area-text { font-size:.7rem; letter-spacing:.2em; color:var(--gray); text-transform:uppercase; }
.photo-area-icon { font-size:2rem; margin-bottom:.5rem; }
.photo-previews { display:flex; gap:.5rem; flex-wrap:wrap; margin-top:.8rem; }
.photo-preview { position:relative; width:80px; height:80px; }
.photo-preview img { width:100%; height:100%; object-fit:cover; border-radius:2px; }
.photo-preview-del { position:absolute; top:-6px; right:-6px; background:var(--red); border:none; color:#fff; width:18px; height:18px; border-radius:50%; cursor:pointer; font-size:.7rem; display:flex; align-items:center; justify-content:center; }

/* PRODUCTS LIST */
.products-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:1rem; }
.product-item { background:var(--card); border:1px solid var(--border); border-radius:4px; overflow:hidden; }
.product-item-img { width:100%; aspect-ratio:3/4; object-fit:cover; display:block; background:#1a1a1a; }
.product-item-body { padding:.8rem; }
.product-item-cat { font-size:.5rem; letter-spacing:.25em; color:var(--red); text-transform:uppercase; margin-bottom:.2rem; }
.product-item-name { font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:.05em; margin-bottom:.4rem; }
.product-item-price { font-size:.75rem; color:var(--gray); margin-bottom:.6rem; }
.product-item-actions { display:flex; gap:.4rem; }
.product-item-actions button { flex:1; padding:.4rem; font-size:.55rem; letter-spacing:.1em; border-radius:2px; cursor:pointer; font-family:'Montserrat',sans-serif; text-transform:uppercase; }
.edit-btn { background:none; border:1px solid var(--border); color:var(--red); }
.del-btn { background:none; border:1px solid rgba(255,255,255,.1); color:var(--gray); }

/* STATUS */
.status { font-size:.65rem; letter-spacing:.1em; padding:.4rem .8rem; border-radius:2px; margin-left:.5rem; display:none; }
.status.success { background:rgba(74,222,128,.15); color:#4ade80; display:inline-block; }
.status.error { background:rgba(232,53,42,.15); color:var(--red); display:inline-block; }
.status.loading { background:rgba(255,255,255,.1); color:var(--gray); display:inline-block; }

.empty-state { text-align:center; padding:3rem; color:var(--gray); font-size:.75rem; letter-spacing:.2em; text-transform:uppercase; }

@media(max-width:600px) {
  .form-grid { grid-template-columns:1fr; }
  .products-grid { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Zerufy</div>
    <div class="login-sub">Admin Panel</div>
    <input class="login-input" type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">ENTRAR</button>
    <div class="login-error" id="loginError">Contraseña incorrecta</div>
  </div>
</div>

<!-- HEADER -->
<div class="header" id="mainApp" style="display:none;">
  <div>
    <div class="logo">Zerufy</div>
    <div class="logo-sub">Admin Panel</div>
  </div>
  <div style="display:flex;gap:.5rem;align-items:center;">
    <a href="https://zerufyx.github.io/Zerufy/" target="_blank" class="btn">Ver Catálogo</a>
    <button class="btn btn-danger" onclick="doLogout()">Salir</button>
  </div>
</div>

<div class="main" id="mainContent" style="display:none;">

  <!-- ADD/EDIT FORM -->
  <div class="form-card">
    <div class="form-title" id="formTitle">+ Agregar Producto</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Nombre del producto</label>
        <input type="text" id="fNombre" placeholder="Ej: Exclusive Cap Black">
      </div>
      <div class="form-group">
        <label>Categoría</label>
        <select id="fCategoria">
          <option value="caps">Gorras (Caps)</option>
          <option value="wallets">Billeteras (Wallets)</option>
          <option value="shoes">Zapatos (Shoes)</option>
          <option value="belts">Cinturones (Belts)</option>
          <option value="bags">Bolsos (Bags)</option>
          <option value="watches">Relojes (Watches)</option>
          <option value="sunglasses">Lentes (Sunglasses)</option>
          <option value="bracelets">Brazaletes (Bracelets)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Precio ($) — dejar vacío para "Consultar"</label>
        <input type="number" id="fPrecio" placeholder="45">
      </div>
      <div class="form-group">
        <label>Descripción</label>
        <input type="text" id="fDesc" placeholder="Material, talla, color, detalles">
      </div>
      <div class="form-group full">
        <label>Fotos (puedes subir varias)</label>
        <div class="photo-area" id="photoArea">
          <input type="file" id="fFotos" accept="image/*" multiple onchange="previewPhotos(this)">
          <div class="photo-area-icon">📷</div>
          <div class="photo-area-text">Toca para subir fotos</div>
        </div>
        <div class="photo-previews" id="photoPreviews"></div>
      </div>
    </div>
    <div style="margin-top:1.2rem;display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="saveProduct()">GUARDAR PRODUCTO</button>
      <button class="btn" onclick="resetForm()" id="cancelBtn" style="display:none;">CANCELAR</button>
      <span class="status" id="formStatus"></span>
    </div>
  </div>

  <!-- PRODUCTS -->
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.05em;">Productos</div>
    <select onchange="filterProducts(this.value)" style="background:#0f0f0f;border:1px solid var(--border);color:#fff;padding:.5rem .8rem;font-family:'Montserrat',sans-serif;font-size:.65rem;border-radius:2px;outline:none;">
      <option value="all">Todas las categorías</option>
      <option value="caps">Gorras</option>
      <option value="wallets">Billeteras</option>
      <option value="shoes">Zapatos</option>
      <option value="belts">Cinturones</option>
      <option value="bags">Bolsos</option>
      <option value="watches">Relojes</option>
      <option value="sunglasses">Lentes</option>
      <option value="bracelets">Brazaletes</option>
    </select>
  </div>
  <div class="products-grid" id="productsGrid">
    <div class="empty-state" style="grid-column:1/-1;">Cargando productos...</div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://drkcstmcdscklcrefxbs.supabase.co';
const SUPABASE_KEY = 'sb_publishable_k4jAuf7UCzpT_kp2jSpW-A_1ICXHA2s';
const ADMIN_PASS = 'zerufy2024';

// LOGIN
function doLogin() {
  const pass = document.getElementById('loginPass').value;
  if (pass === ADMIN_PASS) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'flex';
    document.getElementById('mainContent').style.display = 'block';
    loadProducts();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function doLogout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('mainContent').style.display = 'none';
  document.getElementById('loginPass').value = '';
}

// SUPABASE API
async function sbFetch(path, options = {}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...options.headers
    }
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function uploadImage(file) {
  const ext = file.name.split('.').pop();
  const name = Date.now() + '_' + Math.random().toString(36).substr(2,6) + '.' + ext;
  const res = await fetch(SUPABASE_URL + '/storage/v1/object/zerufy-products/' + name, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': file.type,
      'Cache-Control': '3600'
    },
    body: file
  });
  if (!res.ok) throw new Error('Upload failed');
  return SUPABASE_URL + '/storage/v1/object/public/zerufy-products/' + name;
}

// PHOTO PREVIEW
let pendingFiles = [];

function previewPhotos(input) {
  pendingFiles = Array.from(input.files);
  const container = document.getElementById('photoPreviews');
  container.innerHTML = pendingFiles.map((f, i) => {
    const url = URL.createObjectURL(f);
    return `<div class="photo-preview">
      <img src="${url}">
      <button class="photo-preview-del" onclick="removeFile(${i})">✕</button>
    </div>`;
  }).join('');
}

function removeFile(idx) {
  pendingFiles.splice(idx, 1);
  const container = document.getElementById('photoPreviews');
  container.innerHTML = pendingFiles.map((f, i) => {
    const url = URL.createObjectURL(f);
    return `<div class="photo-preview">
      <img src="${url}">
      <button class="photo-preview-del" onclick="removeFile(${i})">✕</button>
    </div>`;
  }).join('');
}

// SAVE PRODUCT
let editingId = null;
let existingPhotos = [];

async function saveProduct() {
  const nombre = document.getElementById('fNombre').value.trim();
  const categoria = document.getElementById('fCategoria').value;
  const precio = document.getElementById('fPrecio').value;
  const desc = document.getElementById('fDesc').value.trim();
  const status = document.getElementById('formStatus');

  if (!nombre) { alert('Escribe el nombre del producto'); return; }

  status.className = 'status loading';
  status.textContent = 'Guardando...';
  status.style.display = 'inline-block';

  try {
    // Upload new photos
    let photoUrls = [...existingPhotos];
    for (const file of pendingFiles) {
      const url = await uploadImage(file);
      photoUrls.push(url);
    }

    const product = { nombre, categoria, precio: precio || null, descripcion: desc, fotos: photoUrls };

    if (editingId) {
      await sbFetch('productos?id=eq.' + editingId, {
        method: 'PATCH',
        body: JSON.stringify(product)
      });
    } else {
      await sbFetch('productos', {
        method: 'POST',
        body: JSON.stringify(product)
      });
    }

    status.className = 'status success';
    status.textContent = editingId ? '✓ Actualizado' : '✓ Guardado';
    resetForm();
    loadProducts();
  } catch(e) {
    status.className = 'status error';
    status.textContent = 'Error: ' + e.message;
  }
}

// LOAD PRODUCTS
let allProducts = [];
let currentFilter = 'all';

async function loadProducts() {
  try {
    allProducts = await sbFetch('productos?order=created_at.desc') || [];
    renderProducts();
  } catch(e) {
    document.getElementById('productsGrid').innerHTML = '<div class="empty-state" style="grid-column:1/-1;">Error cargando productos: ' + e.message + '</div>';
  }
}

function filterProducts(cat) {
  currentFilter = cat;
  renderProducts();
}

const catNames = { caps:'Gorras', wallets:'Billeteras', shoes:'Zapatos', belts:'Cinturones', bags:'Bolsos', watches:'Relojes', sunglasses:'Lentes', bracelets:'Brazaletes' };

function renderProducts() {
  const filtered = currentFilter === 'all' ? allProducts : allProducts.filter(p => p.categoria === currentFilter);
  const grid = document.getElementById('productsGrid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;">No hay productos aquí todavía</div>';
    return;
  }
  grid.innerHTML = filtered.map(p => {
    const foto = p.fotos && p.fotos.length ? p.fotos[0] : '';
    const price = p.precio ? '$' + p.precio : 'Consultar precio';
    return `<div class="product-item">
      ${foto ? `<img class="product-item-img" src="${foto}" loading="lazy">` : '<div class="product-item-img" style="display:flex;align-items:center;justify-content:center;color:#333;">Sin foto</div>'}
      <div class="product-item-body">
        <div class="product-item-cat">${catNames[p.categoria] || p.categoria}</div>
        <div class="product-item-name">${p.nombre}</div>
        <div class="product-item-price">${price}</div>
        <div class="product-item-actions">
          <button class="edit-btn" onclick="editProduct(${p.id})">Editar</button>
          <button class="del-btn" onclick="deleteProduct(${p.id}, '${p.nombre}')">Borrar</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// EDIT
function editProduct(id) {
  const p = allProducts.find(p => p.id === id);
  if (!p) return;
  editingId = id;
  existingPhotos = p.fotos || [];
  document.getElementById('formTitle').textContent = '✏️ Editar Producto';
  document.getElementById('fNombre').value = p.nombre;
  document.getElementById('fCategoria').value = p.categoria;
  document.getElementById('fPrecio').value = p.precio || '';
  document.getElementById('fDesc').value = p.descripcion || '';
  document.getElementById('cancelBtn').style.display = 'inline-block';
  // Show existing photos
  document.getElementById('photoPreviews').innerHTML = existingPhotos.map((url, i) =>
    `<div class="photo-preview"><img src="${url}"><button class="photo-preview-del" onclick="removeExistingPhoto(${i})">✕</button></div>`
  ).join('');
  window.scrollTo({top:0, behavior:'smooth'});
}

function removeExistingPhoto(idx) {
  existingPhotos.splice(idx, 1);
  document.getElementById('photoPreviews').innerHTML = existingPhotos.map((url, i) =>
    `<div class="photo-preview"><img src="${url}"><button class="photo-preview-del" onclick="removeExistingPhoto(${i})">✕</button></div>`
  ).join('');
}

// DELETE
async function deleteProduct(id, nombre) {
  if (!confirm('¿Borrar "' + nombre + '"?')) return;
  try {
    await sbFetch('productos?id=eq.' + id, { method: 'DELETE' });
    loadProducts();
  } catch(e) {
    alert('Error borrando: ' + e.message);
  }
}

// RESET FORM
function resetForm() {
  editingId = null;
  existingPhotos = [];
  pendingFiles = [];
  document.getElementById('formTitle').textContent = '+ Agregar Producto';
  document.getElementById('fNombre').value = '';
  document.getElementById('fPrecio').value = '';
  document.getElementById('fDesc').value = '';
  document.getElementById('photoPreviews').innerHTML = '';
  document.getElementById('fFotos').value = '';
  document.getElementById('cancelBtn').style.display = 'none';
  document.getElementById('formStatus').style.display = 'none';
}
</script>
</body>
</html>
